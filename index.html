<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mahalaxmi | Personal Space</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --accent-color: #38bdf8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        .profile-header {
            margin-bottom: 2rem;
        }

        .profile-avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid var(--accent-color);
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.05em;
        }

        .subtitle {
            color: var(--accent-color);
            font-size: 1rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
        }

        .bio {
            color: var(--text-muted);
            font-size: 1.05rem;
            margin-bottom: 2rem;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .link-card {
            background-color: var(--card-bg);
            padding: 1rem;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-color);
            font-weight: 600;
            transition: transform 0.2s ease, border-color 0.2s ease;
            border: 1px solid transparent;
        }

        .link-card:hover {
            transform: translateY(-2px);
            border-color: var(--accent-color);
        }

        footer {
            margin-top: 3rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        footer a {
            color: var(--accent-color);
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="profile-header">
            <img class="profile-avatar" src="maha.png" alt="Mahalaxmi Profile Picture">
            <h1>Mahalaxmi</h1>
            <p class="subtitle">Cloud & Web Developer</p>
            <p class="bio">Welcome to my personal corner of the internet. Building things on the cloud and exploring web architectures.</p>
        </header>

        <main class="links-container">
            <a href="https://github.com/Mahalaxmivn" target="_blank" class="link-card">
                🐙 View My GitHub Projects
            </a>
            <a href="#" class="link-card">
                📝 Read My Blog (Coming Soon)
            </a>
            <a href="mailto:your-email@example.com" class="link-card">
                ✉️ Get In Touch
            </a>
        </main>

        <footer>
            <p>Hosted securely via <a href="https://mahalaxmi.sankalp.life">mahalaxmi.sankalp.life</a></p>
        </footer>
    </div>

</body>
</html>
